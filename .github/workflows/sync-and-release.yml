name: Sync Upstream and Release TPK

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force build for a specific upstream version (e.g. 1.19.1)'
        required: false
        type: string

permissions:
  contents: write

env:
  UPSTREAM_REPO: cryptomator/cli
  APP_NAME: Cryptomator
  APP_ID: cryptomator
  PKG_REVISION: "0"

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
      release_url: ${{ steps.check.outputs.release_url }}
    steps:
      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_VERSION: ${{ inputs.force_version }}
        run: |
          if [ -n "$FORCE_VERSION" ]; then
            echo "Forced version: $FORCE_VERSION"
            echo "version=$FORCE_VERSION" >> "$GITHUB_OUTPUT"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            RELEASE_URL=$(curl -sf \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/tags/${FORCE_VERSION}" \
              | jq -r '.url')
            echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UPSTREAM_JSON=$(curl -sf \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest")

          UPSTREAM_TAG=$(echo "$UPSTREAM_JSON" | jq -r '.tag_name')
          RELEASE_URL=$(echo "$UPSTREAM_JSON" | jq -r '.url')

          LOCAL_TAG=$(curl -sf \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // empty' 2>/dev/null || true)

          echo "Upstream: $UPSTREAM_TAG | Local: $LOCAL_TAG"
          echo "Release API URL: $RELEASE_URL"

          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "::error::Failed to fetch upstream release tag"
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$UPSTREAM_TAG" != "$LOCAL_TAG" ]; then
            echo "New release detected: $UPSTREAM_TAG"
            echo "version=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
            echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date"
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-tpk:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            tos_label: TOS7_TOS6
            app_dir_prefix: x64_tos6_apps
            cli_arch: linux-x64
          - arch: aarch64
            tos_label: TOS6
            app_dir_prefix: arm_tos6_apps
            cli_arch: linux-aarch64
    env:
      VERSION: ${{ needs.check-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq xz-utils unzip

      - name: Clone TOS app-pkg-tools
        run: git clone --depth 1 https://github.com/TerraMasterOfficial/app-pkg-tools.git /tmp/app-pkg-tools

      - name: Download Cryptomator CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_URL: ${{ needs.check-release.outputs.release_url }}
        run: |
          echo "Fetching release from: $RELEASE_URL"
          RELEASE_JSON=$(curl -sf \
            -H "Authorization: token $GH_TOKEN" \
            "$RELEASE_URL")

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" \
            | jq -r ".assets[] | select(.name | test(\"cryptomator-cli-.*${{ matrix.cli_arch }}.*\\\\.zip$\")) | .browser_download_url" \
            | head -1)

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::No CLI zip found for ${{ matrix.cli_arch }} in release ${VERSION}"
            echo "Available assets:"
            echo "$RELEASE_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          curl -sSfL -o /tmp/cryptomator-cli.zip "$DOWNLOAD_URL"
          unzip /tmp/cryptomator-cli.zip -d /tmp/
          echo "Extracted:"
          ls -la /tmp/cryptomator-cli/

      - name: Prepare TOS package structure
        run: |
          PKG_DIR="/tmp/app-pkg-tools/${{ matrix.app_dir_prefix }}/${{ env.APP_NAME }}/output"
          mkdir -p "${PKG_DIR}/sbin"
          mkdir -p "${PKG_DIR}/lib"
          mkdir -p "${PKG_DIR}/images/icons"
          mkdir -p "${PKG_DIR}/images/cryptomator"
          mkdir -p "${PKG_DIR}/init.d"
          mkdir -p "${PKG_DIR}/scripts"
          mkdir -p "${PKG_DIR}/config"
          mkdir -p "${PKG_DIR}/modules"

          cp -a /tmp/cryptomator-cli "${PKG_DIR}/lib/cryptomator-cli"

          cp tpk/sbin/cryptomator-api "${PKG_DIR}/sbin/"
          chmod +x "${PKG_DIR}/sbin/cryptomator-api"

          TPK_VERSION="${VERSION}.${{ env.PKG_REVISION }}"

          export TPK_VERSION
          export PLATFORM="${{ matrix.arch }}"
          envsubst '${TPK_VERSION} ${PLATFORM}' \
            < tpk/config.ini.template \
            > "${PKG_DIR}/config.ini"

          sed -i "s/^version = .*/version = ${VERSION}/" tpk/cryptomator.lang
          cp tpk/cryptomator.lang "${PKG_DIR}/"

          cp tpk/init.d/cryptomator.service "${PKG_DIR}/init.d/"
          cp tpk/scripts/install.sh "${PKG_DIR}/scripts/"
          cp tpk/scripts/remove.sh "${PKG_DIR}/scripts/"
          chmod +x "${PKG_DIR}/scripts/"*.sh

          cp tpk/images/icons/cryptomator.svg "${PKG_DIR}/images/icons/cryptomator.svg"
          cp tpk/images/cryptomator/vaults.svg "${PKG_DIR}/images/cryptomator/vaults.svg"
          cp tpk/modules/index.json "${PKG_DIR}/modules/index.json"

          tar -Jcf "${PKG_DIR}/webui.bz2" -C tpk/webui .

          echo "Package structure:"
          find "${PKG_DIR}" -maxdepth 3 -type f | sort

      - name: Build TPK package
        run: |
          PKG_DIR="/tmp/app-pkg-tools/${{ matrix.app_dir_prefix }}/${{ env.APP_NAME }}/output"
          cd "${PKG_DIR}"

          # TPK binary format (reverse-engineered from official makeapp tool):
          #   [2048 bytes] JSON config header with md5 field, null-padded
          #   [8192 bytes] .lang file content, null-padded
          #   [remainder]  tar.xz archive of app files
          #
          # The md5 in the header = MD5 of the tar.xz payload.
          # The config.ini INSIDE the tar does NOT have an md5 field.

          # 1. Generate INFO manifest (all files/folders except INFO and config.ini)
          echo "Generating INFO manifest..."
          : > INFO
          find . -mindepth 1 -not -name INFO -not -name config.ini -not -path ./INFO -not -path ./config.ini | sort | while IFS= read -r entry; do
            entry="${entry#./}"
            if [ -d "$entry" ]; then
              echo "1:folder:${entry}:" >> INFO
            elif [ -f "$entry" ]; then
              fmd5=$(md5sum "$entry" | awk '{print $1}')
              echo "1:file:${entry}:${fmd5}" >> INFO
            fi
          done
          echo "INFO manifest:"
          cat INFO

          # 2. Create tar.xz of all files in the output directory
          echo "Creating tar.xz payload..."
          tar cJf /tmp/payload.tar.xz .

          # 3. Compute MD5 of the tar.xz payload
          PAYLOAD_MD5=$(md5sum /tmp/payload.tar.xz | awk '{print $1}')
          echo "Payload MD5: ${PAYLOAD_MD5}"

          # 4. Create minified JSON header with md5 injected (strip internal-only fields)
          jq -c --arg md5 "$PAYLOAD_MD5" 'del(.user, .group, .low_memory, .cli) | {id: .id, md5: $md5} + (. | to_entries | map(select(.key != "id")) | from_entries)' config.ini > /tmp/header.json
          echo "TPK header:"
          cat /tmp/header.json

          # 5. Assemble TPK: [2048-byte header] + [8192-byte lang] + [tar.xz]
          python3 -c "
          import sys
          header = open('/tmp/header.json','rb').read()
          lang = open('${{ env.APP_ID }}.lang','rb').read()
          payload = open('/tmp/payload.tar.xz','rb').read()
          if len(header) > 2048:
              print(f'ERROR: JSON header too large ({len(header)} > 2048)', file=sys.stderr)
              sys.exit(1)
          if len(lang) > 8192:
              print(f'ERROR: Lang file too large ({len(lang)} > 8192)', file=sys.stderr)
              sys.exit(1)
          tpk = header + b'\x00' * (2048 - len(header)) + lang + b'\x00' * (8192 - len(lang)) + payload
          open('/tmp/${{ env.APP_NAME }}.tpk','wb').write(tpk)
          print(f'TPK assembled: {len(tpk)} bytes (header={len(header)}, lang={len(lang)}, payload={len(payload)})')
          "

          echo "TPK size: $(du -h /tmp/${{ env.APP_NAME }}.tpk | cut -f1)"

      - name: Collect and rename TPK
        run: |
          TPK_VERSION="${VERSION}.${{ env.PKG_REVISION }}"
          TPK_NAME="${{ env.APP_NAME }} ${{ matrix.tos_label }} ${TPK_VERSION} ${{ matrix.arch }}.tpk"

          mkdir -p "${{ github.workspace }}/dist"
          cp "/tmp/${{ env.APP_NAME }}.tpk" "${{ github.workspace }}/dist/${TPK_NAME}"
          echo "Packaged: ${TPK_NAME}"
          ls -lh "${{ github.workspace }}/dist/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpk-${{ matrix.arch }}
          path: dist/*.tpk
          retention-days: 5

  release:
    needs: [check-release, build-tpk]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all TPK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Cryptomator ${{ env.VERSION }} for TerraMaster TOS"
          body: |
            Automated TerraMaster TOS package build for [Cryptomator CLI ${{ env.VERSION }}](https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/${{ env.VERSION }}).

            Provides a web-based vault management UI for TerraMaster NAS, powered by cryptomator-cli.

            ## Packages
            | File | Architecture | TOS Compatibility |
            |------|-------------|-------------------|
            | `Cryptomator TOS7_TOS6 ${{ env.VERSION }}.0 x86_64.tpk` | x86_64 (Intel/AMD) | TOS 6 + TOS 7 |
            | `Cryptomator TOS6 ${{ env.VERSION }}.0 aarch64.tpk` | aarch64 (ARM) | TOS 6 |

            ## Installation
            1. Download the `.tpk` matching your NAS architecture
            2. Open the TOS web interface
            3. Navigate to **App Management** > **Install from TPK**
            4. Select the downloaded `.tpk` file and install

            ## Notes
            - Built from upstream [cryptomator/cli](https://github.com/cryptomator/cli) release artifacts
            - Web UI for vault management (add, unlock, lock, remove vaults)
            - Vaults are mounted via FUSE at `/mnt/cryptomator/`
            - Packaged using [TerraMaster app-pkg-tools](https://github.com/TerraMasterOfficial/app-pkg-tools)
          files: dist/*.tpk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
